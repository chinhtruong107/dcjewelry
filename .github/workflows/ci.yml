name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - Laravel
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: Cài đặt Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Copy file .env
        run: cp .env.example .env

      - name: Generate app key
        run: php artisan key:generate

      - name: Kiểm tra code style Pint
        run: ./vendor/bin/pint --test

      - name: Chạy test PHPUnit
        run: php artisan test

  frontend:
    name: Frontend - Next.js
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cài đặt dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Build thử
        run: npm run build

  notify-ci:
    name: Notify CI Result
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    continue-on-error: true

    steps:
      - name: Send CI notification to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BACKEND_RESULT: ${{ needs.backend.result }}
          FRONTEND_RESULT: ${{ needs.frontend.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if [ "$BACKEND_RESULT" = "success" ] && \
             [ "$FRONTEND_RESULT" = "success" ]; then
            STATUS="✅ CI THÀNH CÔNG"
          else
            STATUS="❌ CI THẤT BẠI"
          fi

          MESSAGE="$STATUS

          Repo: $REPOSITORY
          Branch: $BRANCH
          Backend: $BACKEND_RESULT
          Frontend: $FRONTEND_RESULT

          Log: https://github.com/$REPOSITORY/actions/runs/$RUN_ID"

          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}")

          echo "Telegram response:"
          echo "$RESPONSE"

          if ! echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "Telegram send failed"
            exit 1
          fi

          echo "Telegram CI notification sent successfully"

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend, frontend, notify-ci]

    if: >
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.backend.result == 'success' &&
      needs.frontend.result == 'success'

    timeout-minutes: 30

    steps:
      - name: Configure SSH
        env:
          CONTROL_NODE_SSH_KEY: ${{ secrets.CONTROL_NODE_SSH_KEY }}
          CONTROL_NODE_HOST: ${{ secrets.CONTROL_NODE_HOST }}
        run: |
          mkdir -p ~/.ssh

          printf '%s\n' "$CONTROL_NODE_SSH_KEY" > ~/.ssh/control.pem

          chmod 700 ~/.ssh
          chmod 600 ~/.ssh/control.pem

          ssh-keyscan -H "$CONTROL_NODE_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy via Ansible Control Node
        env:
          CONTROL_NODE_HOST: ${{ secrets.CONTROL_NODE_HOST }}
          CONTROL_NODE_USER: ${{ secrets.CONTROL_NODE_USER }}
        run: |
          ssh \
            -i ~/.ssh/control.pem \
            -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=30 \
            "$CONTROL_NODE_USER@$CONTROL_NODE_HOST" \
            "cd /home/ubuntu/ansible-jewelry && \
             git fetch origin main && \
             git reset --hard origin/main && \
             chmod +x scripts/deploy.sh && \
             ./scripts/deploy.sh"

  notify-deploy:
    name: Notify Deploy Result
    runs-on: ubuntu-latest
    needs: [backend, frontend, deploy]

    if: >
      always() &&
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.backend.result == 'success' &&
      needs.frontend.result == 'success'

    continue-on-error: true

    steps:
      - name: Send deploy notification to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SHORT_SHA=$(echo "$COMMIT_SHA" | cut -c1-7)

          if [ "$DEPLOY_RESULT" = "success" ]; then
            STATUS="🚀 DEPLOY THÀNH CÔNG"
          else
            STATUS="❌ DEPLOY THẤT BẠI"
          fi

          MESSAGE="$STATUS

          Repo: $REPOSITORY
          Branch: $BRANCH
          Commit: $SHORT_SHA
          Người thực hiện: $ACTOR
          Deploy: $DEPLOY_RESULT

          Website: https://dcjewelry.duckdns.org
          Log: https://github.com/$REPOSITORY/actions/runs/$RUN_ID"

          RESPONSE=$(curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}")

          echo "Telegram response:"
          echo "$RESPONSE"

          if ! echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "Telegram send failed"
            exit 1
          fi

          echo "Telegram deploy notification sent successfully"